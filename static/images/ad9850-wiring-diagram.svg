<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1150 720" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1150" height="720" fill="#FAFAFA" rx="8"/>

  <!-- Title (corrected flow) -->
  <text x="575" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#222">Arduino → AD9850 DDS → LM386 Amplifier → Speaker Wiring Diagram</text>
  <text x="575" y="55" text-anchor="middle" font-size="13" fill="#666">Generating a 600 Hz Sine Wave with Audio Output</text>

  <!-- ==================== ARDUINO ==================== -->
  <rect x="50" y="90" width="200" height="300" rx="10" fill="#2196F3" stroke="#1565C0" stroke-width="2"/>
  <rect x="60" y="100" width="180" height="30" rx="5" fill="#1565C0"/>
  <text x="150" y="120" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Arduino / ESP8266</text>

  <text x="80" y="170" font-size="12" fill="white">D8  — W_CLK</text>
  <text x="80" y="200" font-size="12" fill="white">D9  — FQ_UD</text>
  <text x="80" y="230" font-size="12" fill="white">D10 — DATA</text>
  <text x="80" y="260" font-size="12" fill="white">D11 — RESET</text>
  <text x="80" y="300" font-size="12" fill="white">5V</text>
  <text x="80" y="340" font-size="12" fill="white">GND</text>

  <circle cx="250" cy="166" r="5" fill="#FFC107"/>
  <circle cx="250" cy="196" r="5" fill="#FF9800"/>
  <circle cx="250" cy="226" r="5" fill="#81C784"/>
  <circle cx="250" cy="256" r="5" fill="#9C27B0"/>
  <circle cx="250" cy="296" r="5" fill="#F44336"/>
  <circle cx="250" cy="336" r="5" fill="#555"/>

  <!-- ==================== AD9850 MODULE ==================== -->
  <rect x="400" y="90" width="240" height="300" rx="10" fill="#4CAF50" stroke="#2E7D32" stroke-width="2"/>
  <rect x="410" y="100" width="220" height="30" rx="5" fill="#2E7D32"/>
  <text x="520" y="120" text-anchor="middle" font-size="14" font-weight="bold" fill="white">AD9850 DDS Module</text>

  <!-- AD9850 LEFT pins -->
  <circle cx="400" cy="166" r="5" fill="#FFC107"/>
  <circle cx="400" cy="196" r="5" fill="#FF9800"/>
  <circle cx="400" cy="226" r="5" fill="#81C784"/>
  <circle cx="400" cy="256" r="5" fill="#9C27B0"/>
  <circle cx="400" cy="296" r="5" fill="#F44336"/>
  <circle cx="400" cy="336" r="5" fill="#555"/>

  <text x="415" y="170" font-size="12" fill="white">W_CLK</text>
  <text x="415" y="200" font-size="12" fill="white">FQ_UD</text>
  <text x="415" y="230" font-size="12" fill="white">DATA</text>
  <text x="415" y="260" font-size="12" fill="white">RESET</text>
  <text x="415" y="300" font-size="12" fill="white">VCC</text>
  <text x="415" y="340" font-size="12" fill="white">GND</text>

  <!-- AD9850 RIGHT pins (outputs) -->
  <circle cx="640" cy="320" r="5" fill="#00BCD4"/>
  <circle cx="640" cy="350" r="5" fill="#607D8B"/>

  <text x="625" y="324" font-size="12" fill="white" text-anchor="end">SINE OUT</text>
  <text x="625" y="354" font-size="12" fill="white" text-anchor="end">SQ OUT</text>

  <!-- ==================== WIRES: Arduino → AD9850 ==================== -->
  <line x1="255" y1="166" x2="395" y2="166" stroke="#FFC107" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="255" y1="196" x2="395" y2="196" stroke="#FF9800" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="255" y1="226" x2="395" y2="226" stroke="#81C784" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="255" y1="256" x2="395" y2="256" stroke="#9C27B0" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="255" y1="296" x2="395" y2="296" stroke="#F44336" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="255" y1="336" x2="395" y2="336" stroke="#555" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrowhead)"/>

  <!-- ==================== 10K POT ==================== -->
  <rect x="720" y="285" width="110" height="70" rx="8" fill="#FF9800" stroke="#E65100" stroke-width="2"/>
  <text x="775" y="315" text-anchor="middle" font-size="12" font-weight="bold" fill="white">10kΩ Pot</text>
  <text x="775" y="333" text-anchor="middle" font-size="10" fill="white">(Volume)</text>

  <circle cx="720" cy="320" r="4" fill="#00BCD4"/>
  <circle cx="830" cy="305" r="4" fill="#E91E63"/>
  <circle cx="830" cy="340" r="4" fill="#555"/>

  <text x="840" y="309" font-size="10" fill="#555">Wiper</text>
  <text x="840" y="344" font-size="10" fill="#555">GND</text>

  <!-- Wire: AD9850 SINE OUT → Pot input -->
  <line x1="645" y1="320" x2="716" y2="320" stroke="#00BCD4" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ==================== LM386 AMP ==================== -->
  <rect x="720" y="420" width="220" height="160" rx="10" fill="#E91E63" stroke="#AD1457" stroke-width="2"/>
  <rect x="730" y="430" width="200" height="30" rx="5" fill="#AD1457"/>
  <text x="830" y="450" text-anchor="middle" font-size="14" font-weight="bold" fill="white">LM386 Amplifier</text>

  <circle cx="720" cy="485" r="5" fill="#E91E63" stroke="white" stroke-width="2"/>
  <circle cx="720" cy="515" r="5" fill="#F44336"/>
  <circle cx="720" cy="545" r="5" fill="#555"/>

  <text x="735" y="489" font-size="12" fill="white">Pin 3 — Input</text>
  <text x="735" y="519" font-size="12" fill="white">Pin 6 — VCC (5-9V)</text>
  <text x="735" y="549" font-size="12" fill="white">Pin 4 — GND</text>

  <circle cx="940" cy="545" r="5" fill="#FF5722"/>
  <text x="925" y="549" font-size="12" fill="white" text-anchor="end">Pin 5 — Out</text>

  <!-- Wire: Pot wiper → LM386 Input -->
  <polyline points="834,305 870,305 870,400 700,400 700,485 715,485" fill="none" stroke="#E91E63" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ==================== 220µF CAP ==================== -->
  <rect x="970" y="520" width="80" height="50" rx="6" fill="#607D8B" stroke="#37474F" stroke-width="2"/>
  <text x="1010" y="541" text-anchor="middle" font-size="10" font-weight="bold" fill="white">220µF</text>
  <text x="1010" y="557" text-anchor="middle" font-size="10" fill="white">Cap</text>
  <text x="965" y="535" font-size="13" font-weight="bold" fill="#FF5722">+</text>

  <circle cx="970" cy="545" r="4" fill="#FF5722"/>
  <circle cx="1050" cy="545" r="4" fill="#FF5722"/>

  <!-- Wire: LM386 Output → Cap -->
  <line x1="945" y1="545" x2="966" y2="545" stroke="#FF5722" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ==================== SPEAKER ==================== -->
  <ellipse cx="1100" cy="545" rx="30" ry="35" fill="#795548" stroke="#4E342E" stroke-width="2"/>
  <ellipse cx="1100" cy="545" rx="18" ry="22" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
  <ellipse cx="1100" cy="545" rx="7" ry="9" fill="#A1887F"/>
  <text x="1100" y="595" text-anchor="middle" font-size="12" font-weight="bold" fill="#555">8Ω Speaker</text>

  <circle cx="1070" cy="535" r="4" fill="#FF5722"/>
  <circle cx="1070" cy="558" r="4" fill="#555"/>

  <!-- Wire: Cap → Speaker + -->
  <line x1="1054" y1="545" x2="1066" y2="535" stroke="#FF5722" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ==================== COMMON GROUND BUS ==================== -->
  <line x1="150" y1="650" x2="1070" y2="650" stroke="#333" stroke-width="3"/>

  <!-- Ground symbol (left side, out of the way) -->
  <line x1="150" y1="650" x2="150" y2="665" stroke="#333" stroke-width="3"/>
  <line x1="135" y1="665" x2="165" y2="665" stroke="#333" stroke-width="3"/>
  <line x1="140" y1="670" x2="160" y2="670" stroke="#333" stroke-width="2"/>
  <line x1="145" y1="675" x2="155" y2="675" stroke="#333" stroke-width="1.5"/>

  <!-- Label (right side, no overlap) -->
  <text x="1060" y="672" text-anchor="end" font-size="13" font-weight="bold" fill="#333">Common Ground (GND)</text>

  <!-- GND: Arduino GND pin → bus -->
  <line x1="250" y1="341" x2="250" y2="380" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="250" y1="380" x2="200" y2="380" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="200" y1="380" x2="200" y2="650" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <circle cx="200" cy="650" r="4" fill="#555"/>

  <!-- GND: AD9850 GND pin → bus -->
  <line x1="400" y1="341" x2="400" y2="395" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="400" y1="395" x2="350" y2="395" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="350" y1="395" x2="350" y2="650" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <circle cx="350" cy="650" r="4" fill="#555"/>

  <!-- GND: Pot GND pin → bus -->
  <line x1="830" y1="344" x2="830" y2="380" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="830" y1="380" x2="660" y2="380" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="660" y1="380" x2="660" y2="650" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <circle cx="660" cy="650" r="4" fill="#555"/>

  <!-- GND: LM386 Pin 4 → bus -->
  <line x1="720" y1="550" x2="720" y2="600" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="720" y1="600" x2="900" y2="600" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="900" y1="600" x2="900" y2="650" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <circle cx="900" cy="650" r="4" fill="#555"/>

  <!-- GND: Speaker − → bus -->
  <line x1="1070" y1="562" x2="1070" y2="650" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <circle cx="1070" cy="650" r="4" fill="#555"/>

  <!-- ==================== FOOTER ==================== -->
  <rect x="70" y="700" width="1010" height="3" rx="1" fill="#B0BEC5"/>
  <text x="575" y="717" text-anchor="middle" font-size="11" fill="#777">Signal: Arduino controls AD9850 → SINE OUT → Volume pot → LM386 amp → 220µF coupling cap → 8Ω Speaker | All GND tied together</text>
</svg>
