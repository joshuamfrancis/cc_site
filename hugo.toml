baseURL = "https://blog.bitcraft.stream/"
languageCode = "en-us"
title = "Bit Craft"
[pagination]
  pagerSize = 10
summaryLength = 40
enableRobotsTXT = true

[params]
  description = "Where bits are built, not born. A personal blog about technology, engineering, and ideas."
  author = "Joshua"
  mainSections = ["blog"]

  [params.social]
    github = "https://github.com/joshuamfrancis"
    twitter = ""
    linkedin = "https://www.linkedin.com/in/joshuamfrancis/"
    email = "mailto:hello@example.com"

[taxonomies]
  tag = "tags"
  category = "categories"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    lineNos = false

[[menus.main]]
  name = "Blog"
  url = "/blog/"
  weight = 1

[[menus.main]]
  name = "Projects"
  url = "/projects/"
  weight = 2

[[menus.main]]
  name = "About"
  url = "/about/"
  weight = 3

[[menus.main]]
  name = "Contact"
  url = "/contact/"
  weight = 4
